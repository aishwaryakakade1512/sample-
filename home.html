<!DOCTYPE html>
<html>
<head>
  <title>Home</title>

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: 'Poppins', sans-serif;
    }

    body {
      height: 100vh;
      background: linear-gradient(270deg, #0f172a, #1e293b, #334155);
      background-size: 600% 600%;
      animation: gradientBG 10s ease infinite;
      color: white;
    }

    /* 🔹 Navbar */
    .navbar {
      display: flex;
      justify-content: space-between;
      padding: 20px 40px;
      background: rgba(0,0,0,0.3);
    }

    .navbar h2 {
      color: #ff7eb3;
    }

    .nav-links a {
      margin-left: 20px;
      text-decoration: none;
      color: white;
      transition: 0.3s;
    }

    .nav-links a:hover {
      color: #ff7eb3;
    }

    /* 🔹 Center Content */
    .container {
      height: 80vh;
      display: flex;
      justify-content: center;
      align-items: center;
      text-align: center;
      flex-direction: column;
      animation: fadeIn 1.5s ease;
    }

    .container h1 {
      font-size: 40px;
      margin-bottom: 10px;
    }

    .container p {
      font-size: 18px;
      margin-bottom: 20px;
      opacity: 0.9;
    }

    .btn {
      padding: 12px 25px;
      border: none;
      border-radius: 25px;
      background: linear-gradient(45deg, #ff7eb3, #ff758c);
      color: white;
      font-size: 16px;
      cursor: pointer;
      transition: 0.3s;
    }

    .btn:hover {
      transform: scale(1.1);
      box-shadow: 0 0 15px #ff7eb3;
    }

    /* Animations */
    @keyframes gradientBG {
      0% { background-position: 0% 50%; }
      50% { background-position: 100% 50%; }
      100% { background-position: 0% 50%; }
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(20px); }
      to { opacity: 1; transform: translateY(0); }
    }

  </style>
</head>

<body>

  <!-- 🔹 Navbar -->
  <div class="navbar">
    <h2>MyApp 🚀</h2>

    <div class="nav-links">
      <a href="#">Home</a>
      <a href="#" onclick="goLogin()">Login</a>
    </div>
  </div>

  <!-- 🔹 Main Content -->
  <div class="container">
    <h1>Welcome to Our Platform 👋</h1>
    <p>If you want to use our services, please login first 🔐</p>

    <button class="btn" onclick="goLogin()">Login</button>
  </div>

  <script>
    function goLogin() {
      window.location.href = "login.html";
    }
  </script>

</body>
</html>
