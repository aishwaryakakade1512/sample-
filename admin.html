<!DOCTYPE html>
<html>
<head>
  <title>Admin Dashboard</title>

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: 'Poppins', sans-serif;
    }

    body {
      display: flex;
      height: 100vh;
      background: #0f172a;
      color: white;
    }

    /* 🔹 Sidebar */
    .sidebar {
      width: 230px;
      background: #1e293b;
      padding: 20px;
    }

    .sidebar h2 {
      text-align: center;
      margin-bottom: 30px;
    }

    .sidebar a {
      display: block;
      padding: 12px;
      margin: 10px 0;
      color: white;
      text-decoration: none;
      border-radius: 8px;
      transition: 0.3s;
    }

    .sidebar a:hover {
      background: #334155;
    }

    /* 🔹 Main */
    .main {
      flex: 1;
      padding: 20px;
    }

    /* Topbar */
    .topbar {
      display: flex;
      justify-content: space-between;
      margin-bottom: 20px;
    }

    .logout {
      padding: 8px 15px;
      border: none;
      border-radius: 8px;
      background: #ff4d6d;
      color: white;
      cursor: pointer;
    }

    .logout:hover {
      background: #ff1e4d;
    }

    /* Cards */
    .cards {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 20px;
      margin-bottom: 20px;
    }

    .card {
      background: #1e293b;
      padding: 20px;
      border-radius: 15px;
      transition: 0.3s;
    }

    .card:hover {
      transform: translateY(-5px);
    }

    /* Table */
    table {
      width: 100%;
      border-collapse: collapse;
      background: #1e293b;
      border-radius: 10px;
      overflow: hidden;
    }

    th, td {
      padding: 12px;
      text-align: center;
    }

    th {
      background: #334155;
    }

    tr:hover {
      background: #2d3b55;
    }

    button.action {
      padding: 5px 10px;
      border: none;
      border-radius: 5px;
      cursor: pointer;
    }

    .edit {
      background: #4caf50;
      color: white;
    }

    .delete {
      background: #e63946;
      color: white;
    }

  </style>
</head>

<body>

  <!-- 🔹 Sidebar -->
  <div class="sidebar">
    <h2>👑 Admin</h2>
    <a href="#">🏠 Dashboard</a>
    <a href="#">👥 Manage Users</a>
    <a href="#">📊 Reports</a>
    <a href="#">⚙ Settings</a>
  </div>

  <!-- 🔹 Main -->
  <div class="main">

    <!-- Topbar -->
    <div class="topbar">
      <h1>Admin Dashboard 🚀</h1>
      <button class="logout" onclick="logout()">Logout</button>
    </div>

    <!-- Cards -->
    <div class="cards">
      <div class="card">
        <h3>Total Users</h3>
        <p>120</p>
      </div>

      <div class="card">
        <h3>Active Users</h3>
        <p>95</p>
      </div>

      <div class="card">
        <h3>Admins</h3>
        <p>5</p>
      </div>
    </div>

    <!-- Table -->
    <h2>👥 User Management</h2>
    <br>

    <table>
      <tr>
        <th>ID</th>
        <th>Name</th>
        <th>Email</th>
        <th>Role</th>
        <th>Action</th>
      </tr>

      <tr>
        <td>1</td>
        <td>Aishwarya</td>
        <td>aish@gmail.com</td>
        <td>User</td>
        <td>
          <button class="action edit">Edit</button>
          <button class="action delete">Delete</button>
        </td>
      </tr>

      <tr>
        <td>2</td>
        <td>Admin</td>
        <td>admin@gmail.com</td>
        <td>Admin</td>
        <td>
          <button class="action edit">Edit</button>
          <button class="action delete">Delete</button>
        </td>
      </tr>

    </table>

  </div>

  <script>
    function logout() {
      localStorage.removeItem("token");
      alert("Logged out!");
      window.location.href = "login.html";
    }
  </script>

</body>
</html>
